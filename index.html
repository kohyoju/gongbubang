<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공부 스케줄 트래커</title>

<style>
body { font-family: sans-serif; padding:20px; }
button { margin:5px; }
.card { border:1px solid #ddd; padding:10px; margin:10px 0; }
.date-btn { margin:3px; }
</style>
</head>
<body>

<h1>📚 공부 스케줄 트래커</h1>

<h2>👤 이름 추가</h2>
<input id="userInput" placeholder="이름 입력">
<button onclick="addUser()">추가</button>

<select id="userSelect" onchange="render()"></select>
<button onclick="deleteUser()">선택 이름 삭제</button>

<h2>📅 날짜 선택 (일주일)</h2>
<div id="dateButtons"></div>

<h2>과목 추가</h2>
<input id="subjectInput" placeholder="과목 입력">
<button onclick="addSubject()">추가</button>

<div id="subjects"></div>

<script>
let data = JSON.parse(localStorage.getItem("studyData")) || {};
let selectedDate = null;

// 저장
function save() {
    localStorage.setItem("studyData", JSON.stringify(data));
    render();
}

// 👤 사용자 추가
function addUser() {
    const input = document.getElementById("userInput");
    const name = input.value.trim();
    if (!name) return;

    if (!data[name]) {
        data[name] = {
            subjects: {},
            progress: {}
        };
    }

    input.value = "";
    updateUserSelect();
    save();
}

// 👤 사용자 삭제
function deleteUser() {
    const user = document.getElementById("userSelect").value;
    if (!user) return;

    delete data[user];
    updateUserSelect();
    save();
}

// 사용자 목록
function updateUserSelect() {
    const select = document.getElementById("userSelect");
    select.innerHTML = "";

    for (let name in data) {
        select.innerHTML += `<option value="${name}">${name}</option>`;
    }
}

// 📅 날짜 생성
function generateWeek() {
    const container = document.getElementById("dateButtons");
    container.innerHTML = "";

    const today = new Date();

    for (let i = 0; i < 7; i++) {
        let d = new Date();
        d.setDate(today.getDate() + i);

        let str = d.toISOString().slice(0,10);

        container.innerHTML += `
        <button class="date-btn" onclick="selectDate('${str}')">
        ${str.slice(5)}
        </button>`;
    }
}

// 날짜 선택
function selectDate(date) {
    selectedDate = date;
    render();
}

// 현재 사용자
function getCurrentUser() {
    const user = document.getElementById("userSelect").value;
    if (!user) return null;
    return data[user];
}

// 날짜별 체크 데이터
function getProgress() {
    const user = getCurrentUser();
    if (!user || !selectedDate) return null;

    if (!user.progress[selectedDate]) {
        user.progress[selectedDate] = {};
    }

    return user.progress[selectedDate];
}

// 과목 추가
function addSubject() {
    const subject = document.getElementById("subjectInput").value.trim();
    const user = getCurrentUser();
    if (!subject || !user) return;

    if (!user.subjects[subject]) {
        user.subjects[subject] = [];
    }

    document.getElementById("subjectInput").value = "";
    save();
}

// 과목 삭제
function deleteSubject(subject) {
    const user = getCurrentUser();
    delete user.subjects[subject];

    for (let date in user.progress) {
        if (user.progress[date][subject]) {
            delete user.progress[date][subject];
        }
    }

    save();
}

// 내용 추가
function addTask(subject) {
    const user = getCurrentUser();
    const task = prompt("학습 내용 입력");
    if (!task || !user) return;

    user.subjects[subject].push(task);
    save();
}

// 체크 토글
function toggleTask(subject, index) {
    const progress = getProgress();
    if (!progress[subject]) {
        progress[subject] = [];
    }

    progress[subject][index] = !progress[subject][index];
    save();
}

// 화면 렌더
function render() {
    const subjectsDiv = document.getElementById("subjects");
    subjectsDiv.innerHTML = "";

    const user = getCurrentUser();
    const progress = getProgress();
    if (!user || !selectedDate) return;

    for (let subject in user.subjects) {
        let card = `<div class="card"><b>${subject}</b>
        <button onclick="deleteSubject('${subject}')">❌</button><br>
        <button onclick="addTask('${subject}')">내용 추가</button><br>`;

        user.subjects[subject].forEach((task, i) => {
            const checked = progress[subject]?.[i] ? "checked" : "";

            card += `
            <label>
            <input type="checkbox" ${checked}
            onclick="toggleTask('${subject}', ${i})">
            ${task}
            </label><br>`;
        });

        card += `</div>`;
        subjectsDiv.innerHTML += card;
    }
}

// 초기 실행
updateUserSelect();
generateWeek();
</script>

</body>
</html>
