<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>최고네집 공부방</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; padding:20px; }
.card { border:1px solid #ddd; padding:10px; margin:10px 0; }
button { margin:3px; }
</style>
</head>
<body>

<h1>🏠 최고네집 공부방</h1>

<h3>👤 사용자</h3>
<input id="userInput">
<button onclick="addUser()">추가</button>
<select id="userSelect" onchange="changeUser()"></select>

<h3>📅 날짜</h3>
<div id="dates"></div>

<h3>📚 과목</h3>
<input id="subjectInput">
<button onclick="addSubject()">추가</button>

<div id="subjects"></div>

<script>
let data = JSON.parse(localStorage.getItem("study")) || {};
let currentUser=null;
let currentDate=null;

// 저장
function save(){
 localStorage.setItem("study", JSON.stringify(data));
}

// 최초 기본 사용자 생성
function ensureUser(){
 if(Object.keys(data).length===0){
   data["기본"] = {subjects:{}, logs:{}};
 }
}

// 사용자 추가
function addUser(){
 let name=userInput.value.trim();
 if(!name)return;

 data[name]={subjects:{}, logs:{}};
 userInput.value="";
 refreshUsers();
 currentUser=name;
 save();
 render();
}

// 사용자 목록
function refreshUsers(){
 userSelect.innerHTML="";
 Object.keys(data).forEach(u=>{
   userSelect.innerHTML+=`<option>${u}</option>`;
 });
}

// 사용자 변경
function changeUser(){
 currentUser=userSelect.value;
 render();
}

// 날짜
function makeDates(){
 let t=new Date();
 dates.innerHTML="";
 for(let i=0;i<7;i++){
   let d=new Date();
   d.setDate(t.getDate()+i);
   let s=d.toISOString().slice(0,10);

   dates.innerHTML+=`<button onclick="pick('${s}')">${s.slice(5)}</button>`;
 }
}

// 날짜 선택
function pick(d){
 currentDate=d;
 render();
}

// 로그
function getLog(){
 if(!data[currentUser].logs[currentDate]){
   data[currentUser].logs[currentDate]={};
 }
 return data[currentUser].logs[currentDate];
}

// 🔥 과목 추가 (완전 안정)
function addSubject(){
 if(!currentUser){
   alert("먼저 이름 추가하거나 선택해줘!");
   return;
 }

 let s=subjectInput.value.trim();
 if(!s){
   alert("과목 입력해줘!");
   return;
 }

 if(!data[currentUser].subjects[s]){
   data[currentUser].subjects[s]=[];
 }

 subjectInput.value="";
 save();
 render();
}

// 화면
function render(){
 if(!currentUser)return;

 let div=document.getElementById("subjects");
 div.innerHTML="";

 let subjects=data[currentUser].subjects;

 for(let s in subjects){
   div.innerHTML+=`<div class="card">${s}</div>`;
 }
}

// 시작
ensureUser();
refreshUsers();
userSelect.selectedIndex=0;
currentUser=userSelect.value;

let today=new Date().toISOString().slice(0,10);
currentDate=today;

makeDates();
render();
</script>

</body>
</html>
