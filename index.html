<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공부 트래커</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; padding:20px; }
.card { border:1px solid #ddd; padding:10px; margin:10px 0; }

.small { width:250px; height:250px; }

/* ✅ 진짜 크게 보이게 */
.big-wrapper {
  width:700px;
  height:350px;
}

canvas {
  width:100% !important;
  height:100% !important;
}

input[type="number"] { width:60px; margin-left:5px; }
button { margin-left:5px; }
</style>
</head>
<body>

<h2>👤 이름</h2>
<input id="userInput">
<button onclick="addUser()">추가</button>
<select id="userSelect" onchange="render()"></select>

<h2>📅 날짜</h2>
<div id="dates"></div>

<h2>📚 과목</h2>
<input id="subjectInput">
<button onclick="addSubject()">추가</button>

<div id="subjects"></div>

<h3>오늘</h3>
<canvas id="todayChart" class="small"></canvas>

<h3>📊 한달 진척도</h3>
<div class="big-wrapper">
<canvas id="monthChart"></canvas>
</div>

<h3>🎧 듣기</h3>
<div class="big-wrapper">
<canvas id="listenChart"></canvas>
</div>

<script>
let data = JSON.parse(localStorage.getItem("study")) || {};
let selectedDate=null;
let todayChart, monthChart, listenChart;

// 저장
function save(){
 localStorage.setItem("study",JSON.stringify(data));
 render();
}

// 사용자
function addUser(){
 let n=userInput.value.trim();
 if(!n)return;

 if(!data[n]){
   data[n]={subjects:[], logs:{}};
 }

 userInput.value="";
 updateUser();
 save();
}

function updateUser(){
 userSelect.innerHTML="";
 for(let u in data){
   userSelect.innerHTML+=`<option>${u}</option>`;
 }
}

// 날짜
function genDates(){
 let t=new Date();
 dates.innerHTML="";

 for(let i=0;i<7;i++){
  let d=new Date();
  d.setDate(t.getDate()+i);
  let s=d.toISOString().slice(0,10);

  dates.innerHTML+=
  `<button onclick="pick('${s}')">${s.slice(5)}</button>`;
 }
}

function pick(d){
 selectedDate=d;
 render();
}

// 현재
function curUser(){ return userSelect.value; }

function curLog(){
 let u=curUser();
 if(!u||!selectedDate)return null;

 if(!data[u].logs[selectedDate]){
   data[u].logs[selectedDate]={};
 }

 return data[u].logs[selectedDate];
}

// 과목 추가
function addSubject(){
 let s=subjectInput.value.trim();
 let u=curUser();
 if(!s||!u)return;

 if(!data[u].subjects.includes(s)){
   data[u].subjects.push(s);
 }

 subjectInput.value="";
 save();
}

// 🔥 과목 삭제
function deleteSubject(subject){
 let u=curUser();
 data[u].subjects = data[u].subjects.filter(s=>s!==subject);

 // 로그에서도 제거
 for(let d in data[u].logs){
   delete data[u].logs[d][subject];
 }

 save();
}

// 🔥 과목 이름 수정
function editSubject(oldName){
 let u=curUser();
 let newName = prompt("새 과목명", oldName);
 if(!newName) return;

 data[u].subjects = data[u].subjects.map(s=>s===oldName?newName:s);

 for(let d in data[u].logs){
   if(data[u].logs[d][oldName]){
     data[u].logs[d][newName]=data[u].logs[d][oldName];
     delete data[u].logs[d][oldName];
   }
 }

 save();
}

// 내용 추가
function addTask(subject){
 let log=curLog();
 if(!log)return;

 if(!log[subject]) log[subject]=[];

 let name=prompt("학습명");
 if(!name)return;

 let part=prompt("파트");

 log[subject].push({
  name, part, minutes:0, done:false
 });

 save();
}

// 🔥 내용 삭제
function deleteTask(subject,i){
 let log=curLog();
 log[subject].splice(i,1);
 save();
}

// 🔥 내용 수정
function editTask(subject,i){
 let log=curLog();
 let t=log[subject][i];

 let newName=prompt("학습명",t.name);
 if(!newName)return;

 let newPart=prompt("파트",t.part);

 t.name=newName;
 t.part=newPart;

 save();
}

// 분 업데이트
function updateMinutes(subject,i,value){
 let log=curLog();
 log[subject][i].minutes = Number(value)||0;
 save();
}

// 체크
function toggle(subject,i){
 let log=curLog();
 log[subject][i].done=!log[subject][i].done;
 save();
}

// 화면
function render(){
 let u=curUser();
 if(!u)return;

 let log=curLog();
 subjects.innerHTML="";

 let total=0, done=0;

 data[u].subjects.forEach(s=>{
   let html=`<div class="card">
   <b>${s}</b>
   <button onclick="editSubject('${s}')">✏️</button>
   <button onclick="deleteSubject('${s}')">❌</button><br>
   <button onclick="addTask('${s}')">추가</button><br>`;

   let arr = log && log[s] ? log[s] : [];

   arr.forEach((t,i)=>{
     total++;
     if(t.done) done++;

     let isListening = (s==="영어") &&
      (t.name.includes("집중") || t.name.includes("흘려"));

     html+=`
     <label>
     <input type="checkbox" ${t.done?"checked":""}
     onclick="toggle('${s}',${i})">
     ${t.name} (${t.part||""})
     </label>
     `;

     if(isListening){
       html+=`
       <input type="number" value="${t.minutes||0}"
       onchange="updateMinutes('${s}',${i}, this.value)">분
       `;
     }

     html+=`
     <button onclick="editTask('${s}',${i})">✏️</button>
     <button onclick="deleteTask('${s}',${i})">❌</button>
     <br>`;
   });

   html+="</div>";
   subjects.innerHTML+=html;
 });

 drawToday(done,total);
 drawMonth();
 drawListen();
}

// 오늘
function drawToday(done,total){
 let ctx=document.getElementById("todayChart").getContext("2d");
 if(todayChart) todayChart.destroy();

 todayChart=new Chart(ctx,{
  type:"doughnut",
  data:{labels:["완료","미완료"],
  datasets:[{data:total?[done,total-done]:[0,1]}]},
  options:{responsive:false}
 });
}

// 한달
function drawMonth(){
 let u=curUser();
 if(!u)return;

 let days=[],vals=[];
 let t=new Date();

 for(let i=0;i<30;i++){
  let d=new Date();
  d.setDate(t.getDate()-i);
  let s=d.toISOString().slice(0,10);

  let day=data[u].logs[s];
  let total=0, done=0;

  if(day){
   for(let sub in day){
    day[sub].forEach(t=>{
     total++;
     if(t.done) done++;
    });
   }
  }

  days.unshift(s.slice(5));
  vals.unshift(total? Math.round(done/total*100):0);
 }

 let ctx=document.getElementById("monthChart").getContext("2d");
 if(monthChart) monthChart.destroy();

 monthChart=new Chart(ctx,{
  data:{
   labels:days,
   datasets:[
    {type:"bar", data:vals},
    {type:"line", data:vals}
   ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false
  }
 });
}

// 듣기
function drawListen(){
 let u=curUser();
 if(!u)return;

 let days=[],f=[],p=[];
 let t=new Date();

 for(let i=0;i<30;i++){
  let d=new Date();
  d.setDate(t.getDate()-i);
  let s=d.toISOString().slice(0,10);

  let day=data[u].logs[s];
  let ff=0,pp=0;

  if(day){
   if(day["영어"]){
     day["영어"].forEach(t=>{
      if(t.name.includes("집중")) ff+=t.minutes||0;
      if(t.name.includes("흘려")) pp+=t.minutes||0;
     });
   }
  }

  days.unshift(s.slice(5));
  f.unshift(ff);
  p.unshift(pp);
 }

 let ctx=document.getElementById("listenChart").getContext("2d");
 if(listenChart) listenChart.destroy();

 listenChart=new Chart(ctx,{
  type:"line",
  data:{
   labels:days,
   datasets:[
    {label:"집중듣기", data:f},
    {label:"흘려듣기", data:p}
   ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false
  }
 });
}

// 시작
updateUser();
genDates();
render();
</script>

</body>
</html>
