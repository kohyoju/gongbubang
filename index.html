<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>최고네집 공부방</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; padding:20px; }

.card { border:1px solid #ddd; padding:10px; margin:10px 0; }

.big-wrapper { width:700px; height:350px; }
.today-box { width:180px; height:180px; }

canvas { width:100% !important; height:100% !important; }
</style>
</head>
<body>

<h1>🏠 최고네집 공부방</h1>

<input id="userInput">
<button onclick="addUser()">이름 추가</button>
<select id="userSelect" onchange="render()"></select>

<h3>📅 날짜</h3>
<div id="dates"></div>

<h3>📚 과목</h3>
<input id="subjectInput">
<button onclick="addSubject()">추가</button>

<div id="subjects"></div>

<h3>오늘</h3>
<div class="today-box"><canvas id="todayChart"></canvas></div>
<div id="todayPercent"></div>
<div id="celebrate"></div>

<h3>📊 한달 진척도</h3>
<div class="big-wrapper"><canvas id="monthChart"></canvas></div>

<h3>🎧 듣기</h3>
<div class="big-wrapper"><canvas id="listenChart"></canvas></div>

<script>
let data = JSON.parse(localStorage.getItem("study")) || {};
let selectedDate=null;
let todayChart, monthChart, listenChart;

const colors=["#ff6384","#36a2eb","#4caf50","#ff9800"];

function getColor(name){
 let i=Object.keys(data).indexOf(name);
 return colors[i%colors.length];
}

function save(){
 localStorage.setItem("study",JSON.stringify(data));
 render();
}

function addUser(){
 let n=userInput.value.trim();
 if(!n)return;

 if(!data[n]){
   data[n]={subjects:{}, logs:{}};
 }

 updateUser();
 userSelect.value=n;
 setToday();
 save();
}

function updateUser(){
 userSelect.innerHTML="";
 for(let u in data){
   userSelect.innerHTML+=`<option value="${u}">${u}</option>`;
 }

 // ✅ 자동 선택
 if(userSelect.options.length>0){
   userSelect.selectedIndex=0;
 }
}

function genDates(){
 let t=new Date();
 dates.innerHTML="";

 for(let i=0;i<7;i++){
  let d=new Date();
  d.setDate(t.getDate()+i);
  let s=d.toISOString().slice(0,10);

  dates.innerHTML+=`<button onclick="pick('${s}')">${s.slice(5)}</button>`;
 }
}

function setToday(){
 let t=new Date();
 selectedDate=t.toISOString().slice(0,10);
}

function pick(d){
 selectedDate=d;
 render();
}

function curUser(){
 return userSelect.value;
}

function curLog(){
 let u=curUser();
 if(!u||!selectedDate)return null;

 if(!data[u].logs[selectedDate]){
   data[u].logs[selectedDate]={};
 }

 return data[u].logs[selectedDate];
}

function addSubject(){
 let s=subjectInput.value.trim();
 let u=curUser();
 if(!s||!u)return;

 if(!data[u].subjects[s]){
   data[u].subjects[s]=[];
 }

 subjectInput.value="";
 save();
}

function addTask(subject){
 let u=curUser();
 let name=prompt("학습명");
 if(!name)return;

 if(!data[u].subjects[subject].includes(name)){
   data[u].subjects[subject].push(name);
 }

 save();
}

function deleteTask(subject,task){
 let u=curUser();

 data[u].subjects[subject] =
 data[u].subjects[subject].filter(t=>t!==task);

 save();
}

function toggle(subject,task){
 let log=curLog();
 if(!log[subject]) log[subject]={};
 if(!log[subject][task]){
   log[subject][task]={done:false, minutes:0};
 }

 log[subject][task].done=!log[subject][task].done;
 save();
}

function updateMin(subject,task,val){
 let log=curLog();
 if(!log[subject]) log[subject]={};
 if(!log[subject][task]){
   log[subject][task]={done:false, minutes:0};
 }

 log[subject][task].minutes=Number(val)||0;
 save();
}

function render(){
 let u=curUser();
 if(!u)return;

 let log=curLog();
 subjects.innerHTML="";

 let total=0, done=0;

 for(let s in data[u].subjects){
   let html=`<div class="card"><b>${s}</b>
   <button onclick="addTask('${s}')">학습추가</button><br>`;

   data[u].subjects[s].forEach(t=>{
     let info = log?.[s]?.[t] || {done:false, minutes:0};

     total++;
     if(info.done) done++;

     let isListening = (s==="영어") &&
      (t.includes("집중")||t.includes("흘려"));

     html+=`
     <label>
     <input type="checkbox" ${info.done?"checked":""}
     onclick="toggle('${s}','${t}')">
     ${t}
     </label>
     `;

     if(isListening){
       html+=`
       <input type="number" value="${info.minutes}"
       onchange="updateMin('${s}','${t}',this.value)">분
       `;
     }

     html+=`
     <button onclick="deleteTask('${s}','${t}')">❌</button><br>`;
   });

   html+="</div>";
   subjects.innerHTML+=html;
 }

 drawToday(done,total);
 drawMonth();
 drawListen();
}

function drawToday(done,total){
 let u=curUser();
 let color=getColor(u);

 let percent = total? Math.round(done/total*100):0;
 todayPercent.innerText=`오늘 완료율: ${percent}%`;

 celebrate.innerHTML =
 percent===100 && total>0 ? "🎉 100% 달성!" : "";

 let ctx=document.getElementById("todayChart").getContext("2d");
 if(todayChart) todayChart.destroy();

 todayChart=new Chart(ctx,{
  type:"doughnut",
  data:{
    labels:["완료","미완료"],
    datasets:[{
      data:total?[done,total-done]:[0,1],
      backgroundColor:[color,"#ddd"]
    }]
  },
  options:{responsive:true, maintainAspectRatio:false}
 });
}

function drawMonth(){
 let u=curUser();
 if(!u)return;

 let days=[],vals=[];
 let t=new Date();

 for(let i=0;i<30;i++){
  let d=new Date();
  d.setDate(t.getDate()-i);
  let s=d.toISOString().slice(0,10);

  let day=data[u].logs[s];
  let total=0, done=0;

  if(day){
   for(let sub in day){
    for(let task in day[sub]){
     total++;
     if(day[sub][task].done) done++;
    }
   }
  }

  days.unshift(s.slice(5));
  vals.unshift(total?Math.round(done/total*100):0);
 }

 let ctx=document.getElementById("monthChart").getContext("2d");
 if(monthChart) monthChart.destroy();

 monthChart=new Chart(ctx,{
  data:{
   labels:days,
   datasets:[
    {type:"bar", data:vals},
    {type:"line", data:vals}
   ]
  },
  options:{responsive:true, maintainAspectRatio:false}
 });
}

function drawListen(){
 let u=curUser();
 if(!u)return;

 let days=[],f=[],p=[];
 let t=new Date();

 for(let i=0;i<30;i++){
  let d=new Date();
  d.setDate(t.getDate()-i);
  let s=d.toISOString().slice(0,10);

  let day=data[u].logs[s];
  let ff=0,pp=0;

  if(day && day["영어"]){
   for(let task in day["영어"]){
     if(task.includes("집중")) ff+=day["영어"][task].minutes;
     if(task.includes("흘려")) pp+=day["영어"][task].minutes;
   }
  }

  days.unshift(s.slice(5));
  f.unshift(ff);
  p.unshift(pp);
 }

 let ctx=document.getElementById("listenChart").getContext("2d");
 if(listenChart) listenChart.destroy();

 listenChart=new Chart(ctx,{
  type:"line",
  data:{
   labels:days,
   datasets:[
    {label:"집중", data:f},
    {label:"흘려", data:p}
   ]
  },
  options:{responsive:true, maintainAspectRatio:false}
 });
}

// 시작
updateUser();
genDates();
setToday();
render();
</script>

</body>
</html>
