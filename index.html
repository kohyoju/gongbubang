<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>최고네집 공부방</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; padding:20px; }

.card { border:1px solid #ddd; padding:10px; margin:10px 0; }

.big-wrapper { width:700px; height:350px; }
canvas { width:100% !important; height:100% !important; }

.today-box { width:180px; height:180px; }

.percent { font-size:20px; margin-top:10px; }
.celebrate { font-size:22px; color:green; font-weight:bold; }
</style>
</head>
<body>

<h1>🏠 최고네집 공부방</h1>

<input id="userInput">
<button onclick="addUser()">이름 추가</button>
<select id="userSelect" onchange="render()"></select>

<h3>📅 날짜</h3>
<div id="dates"></div>

<h3>📚 과목</h3>
<input id="subjectInput">
<button onclick="addSubject()">추가</button>

<div id="subjects"></div>

<h3>오늘</h3>
<div class="today-box">
  <canvas id="todayChart"></canvas>
</div>
<div id="todayPercent" class="percent"></div>
<div id="celebrate"></div>

<h3>📊 한달 진척도</h3>
<div class="big-wrapper"><canvas id="monthChart"></canvas></div>

<h3>🎧 듣기</h3>
<div class="big-wrapper"><canvas id="listenChart"></canvas></div>

<script>
let data = JSON.parse(localStorage.getItem("study")) || {};
let selectedDate=null;
let todayChart, monthChart, listenChart;

// 🎨 아이별 색상
const colors = ["#ff6384","#36a2eb","#4caf50","#ff9800","#9c27b0","#00bcd4"];

function getColor(name){
 let index = Object.keys(data).indexOf(name);
 return colors[index % colors.length];
}

// 저장
function save(){
 localStorage.setItem("study",JSON.stringify(data));
 render();
}

// 사용자
function addUser(){
 let n=userInput.value.trim();
 if(!n)return;

 if(!data[n]){
   data[n]={subjects:{}, logs:{}};
 }

 updateUser();
 save();
}

function updateUser(){
 userSelect.innerHTML="";
 for(let u in data){
   userSelect.innerHTML+=`<option>${u}</option>`;
 }
}

// 날짜
function genDates(){
 let t=new Date();
 dates.innerHTML="";

 for(let i=0;i<7;i++){
  let d=new Date();
  d.setDate(t.getDate()+i);
  let s=d.toISOString().slice(0,10);

  dates.innerHTML+=`<button onclick="pick('${s}')">${s.slice(5)}</button>`;
 }
}

function pick(d){
 selectedDate=d;
 render();
}

// 현재 로그
function curLog(){
 let u=userSelect.value;
 if(!u||!selectedDate)return null;

 if(!data[u].logs[selectedDate]){
   data[u].logs[selectedDate]={};
 }

 return data[u].logs[selectedDate];
}

// 과목
function addSubject(){
 let s=subjectInput.value.trim();
 let u=userSelect.value;
 if(!s||!u)return;

 if(!data[u].subjects[s]){
   data[u].subjects[s]=[];
 }

 save();
}

// 과목 삭제
function deleteSubject(s){
 let u=userSelect.value;
 delete data[u].subjects[s];

 for(let d in data[u].logs){
   delete data[u].logs[d][s];
 }

 save();
}

// 학습 추가
function addTask(subject){
 let u=userSelect.value;
 let name=prompt("학습명");
 if(!name)return;

 if(!data[u].subjects[subject].includes(name)){
   data[u].subjects[subject].push(name);
 }

 save();
}

// 학습 삭제
function deleteTask(subject,task){
 let u=userSelect.value;
 data[u].subjects[subject] =
  data[u].subjects[subject].filter(t=>t!==task);

 for(let d in data[u].logs){
   if(data[u].logs[d][subject]){
     delete data[u].logs[d][subject][task];
   }
 }

 save();
}

// 체크
function toggle(subject,task){
 let log=curLog();
 if(!log[subject]) log[subject]={};
 if(!log[subject][task]){
   log[subject][task]={done:false, minutes:0};
 }

 log[subject][task].done=!log[subject][task].done;
 save();
}

// 시간 입력
function updateMin(subject,task,val){
 let log=curLog();
 if(!log[subject]) log[subject]={};
 if(!log[subject][task]){
   log[subject][task]={done:false, minutes:0};
 }

 log[subject][task].minutes=Number(val)||0;
 save();
}

// 화면
function render(){
 let u=userSelect.value;
 if(!u)return;

 let log=curLog();
 subjects.innerHTML="";

 let total=0, done=0;

 for(let s in data[u].subjects){
   let html=`<div class="card"><b>${s}</b>
   <button onclick="deleteSubject('${s}')">❌</button><br>
   <button onclick="addTask('${s}')">학습추가</button><br>`;

   data[u].subjects[s].forEach(t=>{
     let info = log?.[s]?.[t] || {done:false, minutes:0};

     let isListening = (s==="영어") &&
      (t.includes("집중") || t.includes("흘려"));

     total++;
     if(info.done) done++;

     html+=`
     <label>
     <input type="checkbox" ${info.done?"checked":""}
     onclick="toggle('${s}','${t}')">
     ${t}
     </label>
     `;

     if(isListening){
       html+=`
       <input type="number" value="${info.minutes}"
       onchange="updateMin('${s}','${t}',this.value)">분
       `;
     }

     html+=`
     <button onclick="deleteTask('${s}','${t}')">❌</button>
     <br>`;
   });

   html+="</div>";
   subjects.innerHTML+=html;
 }

 drawToday(done,total);
 drawMonth();
 drawListen();
}

// 오늘 그래프 + % + 🎉
function drawToday(done,total){
 let u=userSelect.value;
 let color = getColor(u);

 let percent = total ? Math.round(done/total*100) : 0;

 document.getElementById("todayPercent").innerText =
 `오늘 완료율: ${percent}%`;

 let celeb = document.getElementById("celebrate");
 if(percent===100 && total>0){
   celeb.innerHTML = "🎉 오늘 목표 100% 달성! 최고야!";
 } else {
   celeb.innerHTML = "";
 }

 let ctx=document.getElementById("todayChart").getContext("2d");
 if(todayChart) todayChart.destroy();

 todayChart=new Chart(ctx,{
  type:"doughnut",
  data:{
    labels:["완료","미완료"],
    datasets:[{
      data:total?[done,total-done]:[0,1],
      backgroundColor:[color,"#ddd"]
    }]
  },
  options:{responsive:true, maintainAspectRatio:false}
 });
}

// 한달
function drawMonth(){
 let u=userSelect.value;
 if(!u)return;

 let color = getColor(u);

 let days=[],vals=[];
 let t=new Date();

 for(let i=0;i<30;i++){
  let d=new Date();
  d.setDate(t.getDate()-i);
  let s=d.toISOString().slice(0,10);

  let day=data[u].logs[s];
  let total=0, done=0;

  if(day){
   for(let sub in day){
    for(let task in day[sub]){
     total++;
     if(day[sub][task].done) done++;
    }
   }
  }

  days.unshift(s.slice(5));
  vals.unshift(total? Math.round(done/total*100):0);
 }

 let ctx=document.getElementById("monthChart").getContext("2d");
 if(monthChart) monthChart.destroy();

 monthChart=new Chart(ctx,{
  data:{
   labels:days,
   datasets:[
    {type:"bar", data:vals, backgroundColor:color},
    {type:"line", data:vals, borderColor:color}
   ]
  },
  options:{responsive:true, maintainAspectRatio:false}
 });
}

// 듣기
function drawListen(){
 let u=userSelect.value;
 if(!u)return;

 let color = getColor(u);

 let days=[],f=[],p=[];
 let t=new Date();

 for(let i=0;i<30;i++){
  let d=new Date();
  d.setDate(t.getDate()-i);
  let s=d.toISOString().slice(0,10);

  let day=data[u].logs[s];
  let ff=0,pp=0;

  if(day && day["영어"]){
   for(let task in day["영어"]){
     if(task.includes("집중")) ff+=day["영어"][task].minutes;
     if(task.includes("흘려")) pp+=day["영어"][task].minutes;
   }
  }

  days.unshift(s.slice(5));
  f.unshift(ff);
  p.unshift(pp);
 }

 let ctx=document.getElementById("listenChart").getContext("2d");
 if(listenChart) listenChart.destroy();

 listenChart=new Chart(ctx,{
  type:"line",
  data:{
   labels:days,
   datasets:[
    {label:"집중", data:f, borderColor:color},
    {label:"흘려", data:p, borderColor:"#999"}
   ]
  },
  options:{responsive:true, maintainAspectRatio:false}
 });
}

// 시작
updateUser();
genDates();
render();
</script>

</body>
</html>
